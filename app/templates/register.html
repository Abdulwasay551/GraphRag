{% extends "base.html" %}
{% block title %}Register - GraphRAG{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <div class="absolute inset-0 gradient-animated opacity-10"></div>
    <div class="w-full max-w-md relative">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-600 to-primary-800 mb-6 shadow-2xl">
                <i class="fas fa-project-diagram text-white text-2xl"></i>
            </a>
            <h1 class="text-3xl font-bold mb-2">Create Account</h1>
            <p class="text-gray-600 dark:text-gray-400">Start building your knowledge graph</p>
        </div>
        
        <div class="glass dark:glass-dark rounded-2xl p-8 shadow-2xl" x-data="{ loading: false, error: '' }">
            <form @submit.prevent="register" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold mb-2">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="full_name" required 
                            class="w-full pl-12 pr-4 py-3 bg-white dark:bg-dark-200 border-2 border-gray-200 dark:border-dark-300 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-200 dark:focus:ring-primary-900/30 outline-none transition"
                            placeholder="John Doe">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" name="email" required 
                            class="w-full pl-12 pr-4 py-3 bg-white dark:bg-dark-200 border-2 border-gray-200 dark:border-dark-300 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-200 dark:focus:ring-primary-900/30 outline-none transition"
                            placeholder="you@example.com">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" name="password" required minlength="8"
                            class="w-full pl-12 pr-4 py-3 bg-white dark:bg-dark-200 border-2 border-gray-200 dark:border-dark-300 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-200 dark:focus:ring-primary-900/30 outline-none transition"
                            placeholder="••••••••">
                    </div>
                    <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters</p>
                </div>
                
                <div>
                    <label class="flex items-start">
                        <input type="checkbox" required class="w-4 h-4 text-primary-600 rounded border-gray-300 focus:ring-primary-500 mt-1">
                        <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">
                            I agree to the <a href="/terms" class="text-primary-600 hover:text-primary-700 font-semibold">Terms of Service</a> and 
                            <a href="/privacy" class="text-primary-600 hover:text-primary-700 font-semibold">Privacy Policy</a>
                        </span>
                    </label>
                </div>
                
                <div x-show="error" x-text="error" class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-red-800 dark:text-red-300 text-sm"></div>
                
                <button type="submit" :disabled="loading"
                    class="w-full py-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white rounded-xl font-semibold shadow-xl hover:shadow-2xl transform hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Create Account</span>
                    <span x-show="loading" class="flex items-center justify-center">
                        <i class="fas fa-spinner fa-spin mr-2"></i>
                        Creating account...
                    </span>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600 dark:text-gray-400">
                    Already have an account? 
                    <a href="/login" class="text-primary-600 hover:text-primary-700 font-semibold">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
async function register(event) {
    const form = event.target;
    this.loading = true;
    this.error = '';
    
    try {
        const formData = new FormData(form);
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                full_name: formData.get('full_name'),
                email: formData.get('email'),
                password: formData.get('password')
            })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            // Store auth data and redirect to dashboard
            localStorage.setItem('access_token', result.access_token);
            localStorage.setItem('user_data', JSON.stringify(result.user));
            window.location.href = '/dashboard';
        } else {
            this.error = result.detail || 'Registration failed';
            this.loading = false;
        }
    } catch (error) {
        this.error = 'Network error. Please try again.';
        this.loading = false;
    }
}
</script>
{% endblock %}
