{% extends "base.html" %}
{% block title %}Login - GraphRAG{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
    <div class="absolute inset-0 gradient-animated opacity-10"></div>
    <div class="w-full max-w-md relative">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-600 to-primary-800 mb-6 shadow-2xl">
                <i class="fas fa-project-diagram text-white text-2xl"></i>
            </a>
            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
            <p class="text-gray-600 dark:text-gray-400">Sign in to your account</p>
        </div>
        
        <div class="glass dark:glass-dark rounded-2xl p-8 shadow-2xl" x-data="{ loading: false, error: '' }">
            <form @submit.prevent="login" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" name="email" required 
                            class="w-full pl-12 pr-4 py-3 bg-white dark:bg-dark-200 border-2 border-gray-200 dark:border-dark-300 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-200 dark:focus:ring-primary-900/30 outline-none transition"
                            placeholder="you@example.com">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" name="password" required 
                            class="w-full pl-12 pr-4 py-3 bg-white dark:bg-dark-200 border-2 border-gray-200 dark:border-dark-300 rounded-xl focus:border-primary-500 focus:ring-2 focus:ring-primary-200 dark:focus:ring-primary-900/30 outline-none transition"
                            placeholder="••••••••">
                    </div>
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="w-4 h-4 text-primary-600 rounded border-gray-300 focus:ring-primary-500">
                        <span class="ml-2 text-sm">Remember me</span>
                    </label>
                    <a href="/forgot-password" class="text-sm text-primary-600 hover:text-primary-700 font-semibold">Forgot password?</a>
                </div>
                
                <div x-show="error" x-text="error" class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-red-800 dark:text-red-300 text-sm"></div>
                
                <button type="submit" :disabled="loading"
                    class="w-full py-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white rounded-xl font-semibold shadow-xl hover:shadow-2xl transform hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Sign In</span>
                    <span x-show="loading" class="flex items-center justify-center">
                        <i class="fas fa-spinner fa-spin mr-2"></i>
                        Signing in...
                    </span>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600 dark:text-gray-400">
                    Don't have an account? 
                    <a href="/register" class="text-primary-600 hover:text-primary-700 font-semibold">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
async function login(event) {
    const form = event.target;
    const data = { loading: true, error: '' };
    Object.assign(this, data);
    
    try {
        const formData = new FormData(form);
        const email = formData.get('email');
        const password = formData.get('password');
        
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            localStorage.setItem('access_token', result.access_token);
            localStorage.setItem('user_data', JSON.stringify(result.user));
            window.location.href = '/dashboard';
        } else {
            this.error = result.detail || 'Login failed';
            this.loading = false;
        }
    } catch (error) {
        this.error = 'Network error. Please try again.';
        this.loading = false;
    }
}
</script>
{% endblock %}
