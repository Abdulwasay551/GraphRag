{% extends "base.html" %}
{% block title %}AI Chatbot - GraphRAG{% endblock %}
{% block content %}
{% include "components/navbar_auth.html" %}

<div class="min-h-screen bg-gray-50 dark:bg-dark-100" x-data="chatbotData()">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2">AI Chatbot</h1>
            <p class="text-gray-600 dark:text-gray-400">Chat with your knowledge graph using AI</p>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Chat Area -->
            <div class="lg:col-span-3">
                <div class="glass dark:glass-dark rounded-2xl flex flex-col" style="height: calc(100vh - 240px);">
                    <!-- Chat Messages -->
                    <div class="flex-1 overflow-y-auto p-6 space-y-4" x-ref="messagesContainer">
                        <template x-if="messages.length === 0">
                            <div class="text-center py-20">
                                <div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary-100 to-primary-200 dark:from-primary-900/30 dark:to-primary-800/30 flex items-center justify-center mx-auto mb-6">
                                    <i class="fas fa-robot text-4xl text-primary-600"></i>
                                </div>
                                <h3 class="text-xl font-bold mb-2">Start a Conversation</h3>
                                <p class="text-gray-600 dark:text-gray-400">Ask me anything about your documents</p>
                            </div>
                        </template>
                        
                        <template x-for="(message, index) in messages" :key="index">
                            <div class="flex" :class="message.role === 'user' ? 'justify-end' : 'justify-start'">
                                <div class="max-w-3xl" :class="message.role === 'user' ? 'text-right' : 'text-left'">
                                    <div class="inline-flex items-start gap-3" :class="message.role === 'user' ? 'flex-row-reverse' : 'flex-row'">
                                        <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center"
                                            :class="message.role === 'user' ? 'bg-gradient-to-br from-primary-600 to-primary-700' : 'bg-gradient-to-br from-gray-500 to-gray-600'">
                                            <i :class="message.role === 'user' ? 'fas fa-user' : 'fas fa-robot'" class="text-white"></i>
                                        </div>
                                        <div class="rounded-2xl px-6 py-4"
                                            :class="message.role === 'user' ? 'bg-primary-600 text-white' : 'glass dark:glass-dark'">
                                            <p class="whitespace-pre-wrap" x-text="message.content"></p>
                                            <template x-if="message.sources && message.sources.length > 0">
                                                <div class="mt-3 pt-3 border-t border-gray-200 dark:border-dark-300">
                                                    <p class="text-xs font-semibold mb-2 opacity-70">Sources:</p>
                                                    <div class="space-y-1">
                                                        <template x-for="source in message.sources" :key="source">
                                                            <p class="text-xs opacity-70" x-text="source"></p>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-1 px-14" x-text="message.timestamp"></p>
                                </div>
                            </div>
                        </template>
                        
                        <template x-if="isTyping">
                            <div class="flex justify-start">
                                <div class="inline-flex items-start gap-3">
                                    <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center bg-gradient-to-br from-gray-500 to-gray-600">
                                        <i class="fas fa-robot text-white"></i>
                                    </div>
                                    <div class="glass dark:glass-dark rounded-2xl px-6 py-4">
                                        <div class="flex gap-2">
                                            <div class="w-2 h-2 rounded-full bg-primary-600 animate-bounce" style="animation-delay: 0ms"></div>
                                            <div class="w-2 h-2 rounded-full bg-primary-600 animate-bounce" style="animation-delay: 150ms"></div>
                                            <div class="w-2 h-2 rounded-full bg-primary-600 animate-bounce" style="animation-delay: 300ms"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    
                    <!-- Input Area -->
                    <div class="border-t border-gray-200 dark:border-dark-300 p-6">
                        <form @submit.prevent="sendMessage" class="flex gap-3">
                            <input type="text" x-model="inputMessage" 
                                placeholder="Ask a question..."
                                :disabled="isTyping"
                                class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-dark-300 bg-white dark:bg-dark-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 dark:focus:ring-primary-900/30 outline-none transition disabled:opacity-50">
                            <button type="submit" :disabled="!inputMessage.trim() || isTyping"
                                class="px-6 py-3 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Sidebar -->
            <div class="space-y-6">
                <div class="glass dark:glass-dark rounded-xl p-6">
                    <h3 class="font-bold mb-4 flex items-center">
                        <i class="fas fa-lightbulb text-primary-600 mr-2"></i>
                        Sample Questions
                    </h3>
                    <div class="space-y-2">
                        <button @click="inputMessage = 'What are the main topics in my documents?'"
                            class="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-dark-200 transition">
                            Main topics in documents
                        </button>
                        <button @click="inputMessage = 'Summarize the key findings'"
                            class="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-dark-200 transition">
                            Summarize key findings
                        </button>
                        <button @click="inputMessage = 'What entities are most connected?'"
                            class="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-dark-200 transition">
                            Most connected entities
                        </button>
                        <button @click="inputMessage = 'Find relationships between...'"
                            class="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-dark-200 transition">
                            Find relationships
                        </button>
                    </div>
                </div>
                
                <div class="glass dark:glass-dark rounded-xl p-6">
                    <h3 class="font-bold mb-4">Settings</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-sm font-semibold mb-2 block">Temperature</label>
                            <input type="range" x-model="temperature" min="0" max="1" step="0.1"
                                class="w-full">
                            <div class="flex justify-between text-xs text-gray-500 mt-1">
                                <span>Precise</span>
                                <span x-text="temperature"></span>
                                <span>Creative</span>
                            </div>
                        </div>
                        <div>
                            <label class="text-sm font-semibold mb-2 block">Max Tokens</label>
                            <input type="number" x-model="maxTokens" min="100" max="4000" step="100"
                                class="w-full px-3 py-2 rounded-lg border-2 border-gray-200 dark:border-dark-300 bg-white dark:bg-dark-200 focus:border-primary-500 outline-none">
                        </div>
                    </div>
                </div>
                
                <div class="glass dark:glass-dark rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold">Chat History</h3>
                        <button @click="clearChat"
                            class="text-xs text-red-500 hover:text-red-700">
                            <i class="fas fa-trash mr-1"></i>Clear
                        </button>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400">
                        <span x-text="messages.length"></span> messages
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function chatbotData() {
    return {
        messages: [],
        inputMessage: '',
        isTyping: false,
        temperature: 0.7,
        maxTokens: 2000,
        workspaceId: new URLSearchParams(window.location.search).get('workspace'),
        
        async sendMessage() {
            if (!this.inputMessage.trim() || this.isTyping) return;
            
            const userMessage = this.inputMessage.trim();
            this.messages.push({
                role: 'user',
                content: userMessage,
                timestamp: new Date().toLocaleTimeString()
            });
            
            this.inputMessage = '';
            this.isTyping = true;
            this.scrollToBottom();
            
            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch('/api/query/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        query: userMessage,
                        workspace_id: this.workspaceId,
                        temperature: parseFloat(this.temperature),
                        max_tokens: parseInt(this.maxTokens)
                    })
                });
                
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error('Failed to get response');
                }
                
                const data = await response.json();
                
                this.messages.push({
                    role: 'assistant',
                    content: data.answer || data.response || 'I apologize, but I could not generate a response.',
                    sources: data.sources || [],
                    timestamp: new Date().toLocaleTimeString()
                });
                
            } catch (error) {
                console.error('Chat error:', error);
                this.messages.push({
                    role: 'assistant',
                    content: 'Sorry, I encountered an error. Please try again.',
                    timestamp: new Date().toLocaleTimeString()
                });
            } finally {
                this.isTyping = false;
                this.scrollToBottom();
            }
        },
        
        clearChat() {
            if (confirm('Clear all messages?')) {
                this.messages = [];
            }
        },
        
        scrollToBottom() {
            this.$nextTick(() => {
                const container = this.$refs.messagesContainer;
                container.scrollTop = container.scrollHeight;
            });
        }
    }
}
</script>
{% endblock %}
